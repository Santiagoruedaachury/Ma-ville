spring:
  application:
    name: maville-api

  datasource:
    url: jdbc:h2:mem:mavilledb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  h2:
    console:
      enabled: true
      path: /h2-console

jwt:
  secret: MaVille2024SecretKeyForJwtTokenGenerationMustBeAtLeast256Bits!
  expiration-ms: 86400000

montreal:
  api:
    travaux-resource-id: cc41b532-f12d-40fb-9f55-eb58c9a2b12b
    entraves-resource-id: a2bc8014-488c-495d-941b-e7ae1999d1bd

server:
  port: 8080
